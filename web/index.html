<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grudge RTS — Play Now</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://molochdagod.github.io/ObjectStore/branding/favicons/grudge-icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://molochdagod.github.io/ObjectStore/branding/favicons/grudge-icon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://molochdagod.github.io/ObjectStore/branding/favicons/grudge-icon-180x180.png">
  <meta name="description" content="Grudge RTS — A browser-based real-time strategy game set in the Grudge Warlords universe. Play instantly in your browser.">
  <meta property="og:title" content="Grudge RTS — Play Now">
  <meta property="og:description" content="Browser-based RTS game. Command knights, build your army, crush the enemy.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading h1 {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 8px;
    }
    #loading h1 span {
      background: linear-gradient(135deg, #d4a843, #f0d078);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #loading p {
      color: #6e6e80;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .bar-track {
      width: 280px;
      height: 4px;
      background: #1e1e2a;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d4a843, #f0d078);
      transition: width 0.3s;
    }
    #load-status {
      color: #555;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>GRUDGE <span>RTS</span></h1>
    <p>Real-Time Strategy in the Grudge Warlords Universe</p>
    <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
    <div id="load-status">Loading assets...</div>
  </div>

  <canvas id="game-canvas"></canvas>

  <script type="module">
    import { Game } from './js/game.js';
    import { HUD_HEIGHT } from './js/config.js';

    const canvas = document.getElementById('game-canvas');
    const barFill = document.getElementById('bar-fill');
    const loadStatus = document.getElementById('load-status');
    const loading = document.getElementById('loading');

    // Resize canvas to fill window
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (window._game) window._game.resize(canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    async function boot() {
      barFill.style.width = '20%';
      loadStatus.textContent = 'Initializing game engine...';

      const game = new Game(canvas);
      window._game = game;

      barFill.style.width = '50%';
      loadStatus.textContent = 'Loading sprites...';
      await game.load();

      barFill.style.width = '80%';
      loadStatus.textContent = 'Generating map...';
      await new Promise(r => setTimeout(r, 200));

      barFill.style.width = '100%';
      loadStatus.textContent = 'Ready!';
      await new Promise(r => setTimeout(r, 400));

      loading.classList.add('hidden');
      game.start();

      // Keyboard shortcuts
      window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 't') {
          game.trainKnight();
        }
      });

      // HUD button clicks
      canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0 && e.offsetY > canvas.height - HUD_HEIGHT) {
          game.handleHUDClick(e.offsetX, e.offsetY);
        }
      });
    }

    boot().catch(err => {
      console.error('Failed to start Grudge RTS:', err);
      loadStatus.textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
